name: PTT Monitor

on:
  schedule:
    - cron: '0 * * * *'  # 每小時執行一次
  workflow_dispatch:       # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        run: python ptt_monitor.py
