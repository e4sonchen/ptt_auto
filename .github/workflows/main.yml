YAML
name: PTT Monitor

on:
  schedule:
    # 這裡設定每小時執行一次 (UTC 時間，12:00 UTC = 20:00 台北)
    - cron: '0 * * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        run: python ptt_monitor.py
